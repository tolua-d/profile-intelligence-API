version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: insighta_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insighta"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insighta_api
    environment:
      RATELIMIT_ENABLE: "True"
    
    ports:
      - "8000:8000"
    
    depends_on:
      db:
        condition: service_healthy
    
    volumes:
      - ./:/app
      - ./logs:/app/logs
    
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
      "
    
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v2/health"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: insighta_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: insighta_network
